<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Med Basha Pro - TMSA</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448339.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; transition: font-size 0.2s ease; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; text-align: center; }
        .btn-press:active { transform: scale(0.96); transition: 0.1s; }
        
        .theme-blue { --main-color: #3b82f6; }
        .theme-emerald { --main-color: #10b981; }
        .theme-purple { --main-color: #a855f7; }
        .theme-rose { --main-color: #f43f5e; }
        .theme-amber { --main-color: #f59e0b; }

        .dynamic-text { color: var(--main-color); }
        .dynamic-bg { background-color: var(--main-color); }
        .dynamic-border { border-color: var(--main-color); }
        
        .user-gray { background-color: #4b5563 !important; } 
        input[type="time"] { color-scheme: dark; }
        .error-field { border: 2px solid #ef4444 !important; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body x-data="tmsaPro()" x-init="initApp()" x-cloak :class="'theme-' + config.theme" :style="{ fontSize: config.fontSize + 'px' }">

    <template x-if="screen === 1">
        <div class="flex flex-col h-full p-4 space-y-4">
            <header class="flex justify-between items-end pb-2">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight italic">MED BASHA <span class="dynamic-text text-sm not-italic">PRO</span></h1>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Conductor de Bus - Menorca</p>
                </div>
                <button @click="screen = 4" class="p-2 glass-card btn-press"><span class="material-symbols-rounded text-slate-400">settings</span></button>
            </header>

            <div class="glass-card p-4 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-extrabold dynamic-text uppercase text-xs" x-text="mesNombre + ' ' + año"></span>
                    <div class="flex gap-4">
                        <button @click="cambiarMes(-1)" class="p-1"><span class="material-symbols-rounded">chevron_left</span></button>
                        <button @click="cambiarMes(1)" class="p-1"><span class="material-symbols-rounded">chevron_right</span></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center">
                    <template x-for="dia in diasCalendario" :key="dia.fecha">
                        <div @click="seleccionarDia(dia.fecha)" class="py-2 flex flex-col items-center cursor-pointer rounded-xl transition-all" :class="dia.fecha === fechaSeleccionada ? 'bg-white/10 shadow-inner' : ''">
                            <span :class="dia.isHoy ? 'dynamic-bg text-white rounded-full w-7 h-7 flex items-center justify-center' : 'text-slate-400'" 
                                  class="text-xs font-bold" x-text="dia.num"></span>
                            <div class="flex gap-0.5 mt-1 h-1">
                                <template x-if="estadoJornada(dia.fecha)"><div class="w-1.5 h-1.5 rounded-full dynamic-bg"></div></template>
                                <template x-if="tieneBorrador(dia.fecha) && !estadoJornada(dia.fecha)"><div class="w-1.5 h-1.5 rounded-full user-gray animate-pulse"></div></template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button @click="abrirRegistroRapido(false)" class="glass-card p-5 btn-press border-b-4 border-b-blue-600">
                    <span class="material-symbols-rounded text-blue-500 text-3xl">timer</span>
                    <p class="text-[10px] font-black uppercase mt-2 text-slate-300">Continua</p>
                </button>
                <button @click="abrirRegistroRapido(true)" class="glass-card p-5 btn-press border-b-4 border-b-orange-600">
                    <span class="material-symbols-rounded text-orange-500 text-3xl">wb_twilight</span>
                    <p class="text-[10px] font-black uppercase mt-2 text-slate-300">Partida</p>
                </button>
            </div>

            <div class="flex-grow flex flex-col items-center justify-center" @click="screen = 3">
                <h2 class="text-7xl font-black tracking-tighter" x-text="currentTime"></h2>
            </div>

            <button @click="screen = 3" class="w-full py-4 glass-card font-black text-[10px] uppercase tracking-[0.2em] text-slate-400 btn-press">Resumen Mensual</button>
        </div>
    </template>

    <template x-if="screen === 2">
        <div class="flex flex-col h-full p-4 space-y-4 overflow-hidden">
            <header class="flex items-center justify-between">
                <button @click="screen = 1" class="p-2 btn-press"><span class="material-symbols-rounded">arrow_back</span></button>
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500" x-text="formatearFechaLarga(fechaSeleccionada)"></span>
                <div class="w-10"></div>
            </header>

            <div class="flex-grow space-y-4 overflow-y-auto pb-40">
                <div class="glass-card p-4 space-y-4 shadow-2xl border-l-4 border-blue-600">
                    <div class="flex justify-between items-center border-b border-white/5 pb-2">
                        <span class="text-[11px] font-black uppercase text-blue-400">Bloque 1</span>
                        <input type="text" x-model="form.bus1" :class="{'error-field': !form.bus1 && (form.horaE1 || form.horaS1)}" @input="saveDraft()" placeholder="BUS" class="w-20 py-1 input-field text-yellow-500 font-black text-sm uppercase outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="input-field p-2"><label class="text-[7px] font-bold text-slate-500 uppercase block">E</label><input type="time" x-model="form.horaE1" @input="calcularTodo(); saveDraft()" class="w-full text-xl font-black text-blue-400 bg-transparent outline-none"></div>
                        <div class="input-field p-2"><label class="text-[7px] font-bold text-slate-500 uppercase block">S</label><input type="time" x-model="form.horaS1" @input="calcularTodo(); saveDraft()" class="w-full text-xl font-black text-blue-400 bg-transparent outline-none"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="input-field p-2"><input type="number" x-model="form.kmI1" @input="calcularTodo(); saveDraft()" placeholder="KM Ini" class="w-full text-lg font-bold text-slate-200 bg-transparent outline-none"></div>
                        <div class="input-field p-2"><input type="number" x-model="form.kmF1" @input="calcularTodo(); saveDraft()" placeholder="KM Fin" class="w-full text-lg font-bold text-slate-200 bg-transparent outline-none"></div>
                    </div>
                </div>

                <template x-if="form.esPartida">
                    <div class="glass-card p-4 space-y-4 border-l-4 border-orange-500 shadow-2xl">
                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                            <span class="text-[11px] font-black uppercase text-orange-400">Bloque 2</span>
                            <input type="text" x-model="form.bus2" :class="{'error-field': !form.bus2 && (form.horaE2 || form.horaS2)}" @input="saveDraft()" placeholder="BUS" class="w-20 py-1 input-field text-yellow-500 font-black text-sm uppercase outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="input-field p-2"><label class="text-[7px] font-bold text-slate-500 uppercase block">E</label><input type="time" x-model="form.horaE2" @input="calcularTodo(); saveDraft()" class="w-full text-xl font-black text-orange-400 bg-transparent outline-none"></div>
                            <div class="input-field p-2"><label class="text-[7px] font-bold text-slate-500 uppercase block">S</label><input type="time" x-model="form.horaS2" @input="calcularTodo(); saveDraft()" class="w-full text-xl font-black text-orange-400 bg-transparent outline-none"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="input-field p-2"><input type="number" x-model="form.kmI2" @input="calcularTodo(); saveDraft()" placeholder="KM Ini" class="w-full text-lg font-bold text-slate-200 bg-transparent outline-none"></div>
                            <div class="input-field p-2"><input type="number" x-model="form.kmF2" @input="calcularTodo(); saveDraft()" placeholder="KM Fin" class="w-full text-lg font-bold text-slate-200 bg-transparent outline-none"></div>
                        </div>
                    </div>
                </template>

                <div class="grid grid-cols-2 gap-3">
                    <button @click="form.comida = (form.comida === 'SI' ? 'NO' : 'SI'); saveDraft()" class="glass-card p-4 btn-press border-t-2 transition-all" :class="form.comida === 'SI' ? 'border-green-500 bg-green-500/10' : 'border-transparent'">
                        <p class="text-[8px] font-black uppercase text-slate-500">Comida</p>
                        <p class="text-sm font-black mt-1" :class="form.comida === 'SI' ? 'text-green-400' : 'text-slate-700'" x-text="form.comida"></p>
                    </button>
                    <button @click="form.cena = (form.cena === 'SI' ? 'NO' : 'SI'); saveDraft()" class="glass-card p-4 btn-press border-t-2 transition-all" :class="form.cena === 'SI' ? 'border-green-500 bg-green-500/10' : 'border-transparent'">
                        <p class="text-[8px] font-black uppercase text-slate-500">Cena</p>
                        <p class="text-sm font-black mt-1" :class="form.cena === 'SI' ? 'text-green-400' : 'text-slate-700'" x-text="form.cena"></p>
                    </button>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 safe-bottom">
                <div class="glass-card p-5 flex justify-between items-center shadow-2xl">
                    <div class="flex gap-4">
                        <div><p class="text-[8px] font-black text-slate-500 uppercase">H. Total</p><p class="text-2xl font-black text-white" x-text="res.total"></p></div>
                        <div><p class="text-[8px] font-black text-slate-500 uppercase">Nocturn.</p><p class="text-xl font-black dynamic-text" x-text="res.nocturnidad"></p></div>
                    </div>
                    <button @click="guardarJornada()" class="dynamic-bg h-14 w-14 rounded-2xl flex items-center justify-center btn-press shadow-lg">
                        <span class="material-symbols-rounded text-white text-3xl">done_all</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="screen === 3">
        <div class="flex flex-col h-full p-4 space-y-4">
            <header class="flex items-center justify-between">
                <button @click="screen = 1" class="p-2 btn-press"><span class="material-symbols-rounded">arrow_back</span></button>
                <h2 class="font-black uppercase text-[10px] dynamic-text tracking-widest" x-text="'REPORTE ' + mesNombre"></h2>
                <button @click="generarPDF()" class="p-2 text-slate-400"><span class="material-symbols-rounded text-sm">download</span></button>
            </header>

            <div class="grid grid-cols-3 gap-2">
                <div class="glass-card p-2 text-center border-b-2 border-blue-500"><p class="text-[7px] font-black text-slate-500 uppercase">Horas</p><p class="text-sm font-black text-white" x-text="totalMesHoras"></p></div>
                <div class="glass-card p-2 text-center border-b-2 border-orange-500"><p class="text-[7px] font-black text-slate-500 uppercase">Partidos</p><p class="text-sm font-black text-white" x-text="totalMesPluses"></p></div>
                <div class="glass-card p-2 text-center border-b-2 border-indigo-500"><p class="text-[7px] font-black text-slate-500 uppercase">Nocturnas</p><p class="text-sm font-black text-white" x-text="totalMesNocturnidad"></p></div>
                <div class="glass-card p-2 text-center border-b-2 border-green-600"><p class="text-[7px] font-black text-slate-500 uppercase">Comidas</p><p class="text-sm font-black text-white" x-text="totalMesComidas"></p></div>
                <div class="glass-card p-2 text-center border-b-2 border-green-400"><p class="text-[7px] font-black text-slate-500 uppercase">Cenas</p><p class="text-sm font-black text-white" x-text="totalMesCenas"></p></div>
                <div class="glass-card p-2 text-center border-b-2 border-cyan-500"><p class="text-[7px] font-black text-slate-500 uppercase">Kms</p><p class="text-sm font-black text-white" x-text="totalMesKm"></p></div>
            </div>

            <div id="capture-area" class="flex-grow overflow-y-auto space-y-6 pb-20">
                <template x-for="semana in historyByWeeks" :key="semana.num">
                    <div class="glass-card border border-white/5 overflow-hidden">
                        <div class="bg-white/5 px-4 py-2 flex justify-between items-center border-b border-white/10">
                            <span class="text-xs font-black text-slate-300 uppercase" x-text="'Semana ' + semana.num"></span>
                            <button @click="enviarSemanaGoogle(semana)" class="flex items-center gap-1 px-3 py-1 bg-green-500/20 border border-green-500/40 rounded-lg text-green-400 btn-press">
                                <span class="material-symbols-rounded text-sm">upload_file</span>
                                <span class="text-[9px] font-black uppercase">Enviar Sheets</span>
                            </button>
                        </div>
                        <table class="w-full text-[10px] text-center">
                            <thead class="bg-white/5 text-[7px] font-black text-slate-500 uppercase">
                                <tr><th class="p-2">Día</th><th>Bus</th><th>H.</th><th>P.</th><th>Noc.</th><th>C/C</th></tr>
                            </thead>
                            <tbody>
                                <template x-for="item in semana.dias" :key="item.fecha">
                                    <tr class="border-b border-white/5 font-bold">
                                        <td class="p-2 text-slate-400" x-text="formatearFechaCorta(item.fecha)"></td>
                                        <td class="text-yellow-500" x-text="item.bus"></td>
                                        <td class="text-white" x-text="item.hStr"></td>
                                        <td class="text-orange-500" x-text="item.plus"></td>
                                        <td class="text-indigo-400" x-text="item.noctStr"></td>
                                        <td class="text-[8px]">
                                            <span x-show="item.comida === 'SI'" class="text-green-500">C</span>
                                            <span x-show="item.comida === 'SI' && item.cena === 'SI'" class="text-slate-600">/</span>
                                            <span x-show="item.cena === 'SI'" class="text-green-300">C</span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                            <tfoot class="bg-white/5 font-black text-[9px] text-slate-300">
                                <tr>
                                    <td colspan="2" class="p-2 text-left uppercase">Total Semana</td>
                                    <td x-text="semana.totalH.toFixed(2)"></td>
                                    <td x-text="semana.totalP"></td>
                                    <td x-text="semana.totalN.toFixed(2)"></td>
                                    <td><span class="text-green-500" x-text="semana.totalCom"></span>/<span class="text-green-300" x-text="semana.totalCen"></span></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template x-if="screen === 4">
        <div class="flex flex-col h-full p-4 space-y-6">
            <header class="flex items-center gap-4">
                <button @click="screen = 1" class="p-2 btn-press"><span class="material-symbols-rounded">arrow_back</span></button>
                <h2 class="font-black text-xs uppercase tracking-widest">Ajustes</h2>
            </header>
            <div class="space-y-6 overflow-y-auto pb-20">
                <div class="glass-card p-5">
                    <p class="text-[10px] font-black uppercase text-slate-500 mb-4">Color de la App</p>
                    <div class="flex justify-between gap-2">
                        <template x-for="color in ['blue', 'emerald', 'purple', 'rose', 'amber']">
                            <button @click="config.theme = color; saveConfig()" class="w-10 h-10 rounded-full border-2 transition-all shadow-lg" :class="config.theme === color ? 'border-white scale-110' : 'border-transparent'" :style="'background-color: ' + getColorCode(color)"></button>
                        </template>
                    </div>
                </div>
                <div class="glass-card p-5">
                    <p class="text-[10px] font-black uppercase text-slate-500 mb-4">Tamaño de Texto</p>
                    <div class="flex items-center gap-4">
                        <span class="text-xs">A</span>
                        <input type="range" min="12" max="22" x-model="config.fontSize" @input="saveConfig()" class="flex-grow accent-blue-500">
                        <span class="text-xl">A</span>
                    </div>
                </div>
                <div class="glass-card p-5">
                    <p class="text-[10px] font-black uppercase text-slate-500 mb-4">Google Sheets URL</p>
                    <input type="text" x-model="config.sheetUrl" @change="saveConfig()" placeholder="https://script.google.com/..." class="w-full p-3 input-field text-[10px] text-left outline-none text-slate-300">
                </div>
                <button @click="borrarTodo()" class="w-full text-red-500 text-[10px] font-black p-4 uppercase border border-red-500/20 rounded-xl bg-red-500/5">Reiniciar Datos</button>
            </div>
        </div>
    </template>

    <script>
        function tmsaPro() {
            return {
                screen: 1, fechaSeleccionada: new Date().toISOString().split('T')[0], currentTime: '',
                mes: new Date().getMonth(), año: new Date().getFullYear(), mesNombre: '',
                diasCalendario: [], history: [], drafts: {},
                form: { esPartida: false, bus1: '', bus2: '', horaE1: '', horaS1: '', kmI1: '', kmF1: '', horaE2: '', horaS2: '', kmI2: '', kmF2: '', comida: 'NO', cena: 'NO' },
                res: { total: '00:00', totalMinutos: 0, kmTotales: 0, nocturnidad: '00:00' },
                config: { theme: 'blue', fontSize: 14, sheetUrl: '' },
                totalMesHoras: 0, totalMesPluses: 0, totalMesKm: 0, totalMesNocturnidad: 0, totalMesComidas: 0, totalMesCenas: 0,

                initApp() {
                    this.history = JSON.parse(localStorage.getItem('tmsa_history_v8') || '[]');
                    this.drafts = JSON.parse(localStorage.getItem('tmsa_drafts_v8') || '{}');
                    const sc = JSON.parse(localStorage.getItem('tmsa_config_v8'));
                    if (sc) this.config = { ...this.config, ...sc };
                    this.renderCalendario();
                    setInterval(() => { this.currentTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
                },

                saveConfig() { localStorage.setItem('tmsa_config_v8', JSON.stringify(this.config)); },
                getColorCode(c) { return { blue:'#3b82f6', emerald:'#10b981', purple:'#a855f7', rose:'#f43f5e', amber:'#f59e0b' }[c]; },

                renderCalendario() {
                    const days = new Date(this.año, this.mes + 1, 0).getDate();
                    this.mesNombre = new Intl.DateTimeFormat('es-ES', { month: 'long' }).format(new Date(this.año, this.mes));
                    this.diasCalendario = Array.from({length: days}, (_, i) => ({
                        num: i + 1, fecha: `${this.año}-${String(this.mes+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`,
                        isHoy: `${this.año}-${String(this.mes+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}` === new Date().toISOString().split('T')[0]
                    }));
                },

                seleccionarDia(f) { this.fechaSeleccionada = f; this.cargarBorrador(f); this.screen = 2; },
                abrirRegistroRapido(partida) { 
                    this.fechaSeleccionada = new Date().toISOString().split('T')[0];
                    this.cargarBorrador(this.fechaSeleccionada);
                    this.form.esPartida = partida; this.saveDraft(); this.screen = 2; 
                },

                cargarBorrador(f) { 
                    const base = { esPartida: false, bus1: '', bus2: '', horaE1: '', horaS1: '', kmI1: '', kmF1: '', horaE2: '', horaS2: '', kmI2: '', kmF2: '', comida: 'NO', cena: 'NO' };
                    this.form = this.drafts[f] ? {...base, ...this.drafts[f]} : base;
                    this.calcularTodo();
                },

                saveDraft() { this.drafts[this.fechaSeleccionada] = {...this.form}; localStorage.setItem('tmsa_drafts_v8', JSON.stringify(this.drafts)); },
                tieneBorrador(f) { return this.drafts[f] && (this.drafts[f].bus1 || this.drafts[f].horaE1); },

                calcularTodo() {
                    const p = (t) => { if(!t) return null; let [h,m]=t.split(':').map(Number); return h*60+m; };
                    const calcMinutos = (e, s) => {
                        let me = p(e), ms = p(s); if (me === null || ms === null) return 0;
                        return ms <= me ? (ms + 1440) - me : ms - me;
                    };
                    const calcNoct = (e, s) => {
                        let me = p(e), ms = p(s); if (me === null || ms === null) return 0;
                        let noct = 0; let dur = ms <= me ? (ms + 1440) - me : ms - me;
                        for(let i=0; i<dur; i++) {
                            let actual = (me + i) % 1440;
                            if(actual >= 1320 || actual < 360) noct++;
                        }
                        return noct;
                    };

                    let m1 = calcMinutos(this.form.horaE1, this.form.horaS1);
                    let m2 = this.form.esPartida ? calcMinutos(this.form.horaE2, this.form.horaS2) : 0;
                    let n1 = calcNoct(this.form.horaE1, this.form.horaS1);
                    let n2 = this.form.esPartida ? calcNoct(this.form.horaE2, this.form.horaS2) : 0;

                    let tTotalMin = m1 + m2;
                    let tM = (tTotalMin > 0 && tTotalMin < 360) ? 360 : tTotalMin; 

                    this.res.total = Math.floor(tM/60).toString().padStart(2,'0') + ":" + Math.round(tM%60).toString().padStart(2,'0');
                    this.res.nocturnidad = Math.floor((n1+n2)/60).toString().padStart(2,'0') + ":" + Math.round((n1+n2)%60).toString().padStart(2,'0');
                    this.res.kmTotales = ((parseInt(this.form.kmF1) - parseInt(this.form.kmI1)) || 0) + (this.form.esPartida ? ((parseInt(this.form.kmF2) - parseInt(this.form.kmI2)) || 0) : 0);
                    
                    let hF = (this.form.esPartida && this.form.horaS2) ? this.form.horaS2 : this.form.horaS1;
                    if(hF) {
                        if ( (tTotalMin/60 >= 6 && p(hF) >= p("15:30")) || (hF === "15:00" || hF === "15:30") || (tTotalMin/60 > 9) ) this.form.comida = "SI";
                        if (p(hF) >= p("23:00")) this.form.cena = "SI";
                    }
                },

                guardarJornada() {
                    if (!this.form.bus1 || (this.form.esPartida && !this.form.bus2)) { alert("⚠️ BUS obligatorio."); return; }
                    this.history = this.history.filter(i => i.fecha !== this.fechaSeleccionada);
                    this.history.push({ 
                        fecha: this.fechaSeleccionada, bus: this.form.esPartida ? `${this.form.bus1}/${this.form.bus2}` : this.form.bus1, 
                        hStr: this.res.total, km: this.res.kmTotales, plus: this.form.esPartida ? 'SÍ' : 'NO', 
                        noctMinutos: (parseInt(this.res.nocturnidad.split(':')[0])*60) + parseInt(this.res.nocturnidad.split(':')[1]),
                        noctStr: this.res.nocturnidad, comida: this.form.comida, cena: this.form.cena
                    });
                    localStorage.setItem('tmsa_history_v8', JSON.stringify(this.history));
                    delete this.drafts[this.fechaSeleccionada]; localStorage.setItem('tmsa_drafts_v8', JSON.stringify(this.drafts));
                    this.screen = 3;
                },

                get historyByWeeks() {
                    let filtered = this.history.filter(i => {
                        let d = new Date(i.fecha);
                        return d.getMonth() === this.mes && d.getFullYear() === this.año;
                    }).sort((a,b) => b.fecha.localeCompare(a.fecha));
                    
                    let weeks = {}; 
                    let hMes = 0, pMes = 0, kmMes = 0, noctMes = 0, comMes = 0, cenMes = 0;

                    filtered.forEach(i => {
                        let d = new Date(i.fecha); d.setHours(0,0,0,0);
                        d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                        let yearStart = new Date(d.getFullYear(), 0, 1);
                        let wk = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);

                        if(!weeks[wk]) weeks[wk] = { num: wk, dias: [], totalH: 0, totalP: 0, totalN: 0, totalCom: 0, totalCen: 0 };
                        weeks[wk].dias.push(i);
                        let [h, m] = i.hStr.split(':').map(Number);
                        weeks[wk].totalH += (h + m/60);
                        weeks[wk].totalN += (i.noctMinutos / 60);
                        if(i.plus === 'SÍ') weeks[wk].totalP++;
                        if(i.comida === 'SI') weeks[wk].totalCom++;
                        if(i.cena === 'SI') weeks[wk].totalCen++;

                        hMes += (h + m/60); kmMes += i.km; noctMes += (i.noctMinutos / 60);
                        if(i.plus === 'SÍ') pMes++;
                        if(i.comida === 'SI') comMes++;
                        if(i.cena === 'SI') cenMes++;
                    });
                    this.totalMesHoras = hMes.toFixed(2); this.totalMesPluses = pMes; this.totalMesKm = kmMes;
                    this.totalMesNocturnidad = noctMes.toFixed(2); this.totalMesComidas = comMes; this.totalMesCenas = cenMes;
                    return Object.values(weeks).sort((a,b) => b.num - a.num);
                },

                enviarSemanaGoogle(semana) {
                    if(!this.config.sheetUrl) { alert("Configura la URL en ajustes."); return; }
                    const payload = semana.dias.map(d => ({ fecha: d.fecha, bus: d.bus, horas: d.hStr, plus: d.plus, noct: d.noctStr, comida: d.comida, cena: d.cena, sem: semana.num }));
                    fetch(this.config.sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
                    .then(() => alert(`Semana ${semana.num} enviada.`)).catch(() => alert("Error de envío."));
                },

                cambiarMes(v) { this.mes += v; if(this.mes<0){this.mes=11;this.año--} if(this.mes>11){this.mes=0;this.año++} this.renderCalendario(); },
                estadoJornada(f) { return this.history.find(i => i.fecha === f) ? true : false; },
                formatearFechaLarga(f) { return new Intl.DateTimeFormat('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date(f)); },
                formatearFechaCorta(f) { return f.split('-')[2] + '/' + f.split('-')[1]; },
                generarPDF() { html2pdf().from(document.getElementById('capture-area')).save(`TMSA_${this.mesNombre}.pdf`); },
                borrarTodo() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registrado con éxito');
                }).catch(err => {
                    console.log('Fallo al registrar SW', err);
                });
            });
        }
    </script>
